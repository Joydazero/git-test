<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>join page</title>
</head>
<body>
    <div id="container">
        <div class="inner">
            <main id="join">
                <h2>회원가입 페이지에 오신 것을 환영합니다.</h2>
                <form action="post">
                    <div class="join-form">
                        <dl>
                            <dt><label for="join-name">이름</label></dt>
                            <dd><input type="text" id="join-name"></dd>
                        </dl>
                    </div>
                    <div class="join-form">
                        <dl>
                            <dt><label for="join-id">아이디</label></dt>
                            <dd><input type="text" id="join-id"></dd>
                        </dl>
                    </div>
                    <div class="join-form">
                        <dl>
                            <dt><label for="join-password">패스워드</label></dt>
                            <dd><input type="password" id="join-password"></dd>
                        </dl>
                    </div>
                    <div class="join-form">
                        <dl>
                            <dt><label for="join-email">이메일</label></dt>
                            <dd><input type="text" id="join-email"></dd>
                        </dl>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
